<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Новостной сайт</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            transition: all 0.3s;
        }
        body.light {
            background-color: #f0f0f0;
            color: #333;
        }
        body.dark {
            background-color: #1a1a1a;
            color: #f0f0f0;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 50px;
            background-color: #007bff;
            color: white;
        }
        .theme-btn {
            padding: 10px 20px;
            cursor: pointer;
            background-color: white;
            border: none;
            border-radius: 5px;
            margin-left: 10px;
        }
        .auth-buttons a, .add-btn {
            margin: 0 10px;
            padding: 10px 20px;
            background-color: white;
            color: #4da8ff;
            text-decoration: none;
            border-radius: 5px;
        }
        .theme-btn {
            color: #4da8ff;
        }
        body.dark .theme-btn {
            color: #4da8ff;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        .hero-image {
            width: 100%;
            height: 400px;
            object-fit: cover;
            border-radius: 10px;
        }
        .news-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
            margin-top: 40px;
        }
        .news-card {
            background-color: white;
            border-radius: 10px;
            padding: 15px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        body.dark .news-card {
            background-color: #2d2d2d;
            color: #f0f0f0;
        }
        body.dark .auth-buttons a {
            color: #4da8ff;
        }
        .news-card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 5px;
        }
        .news-title {
            font-size: 20px;
            margin: 10px 0;
        }
        .news-description {
            color: #4da8ff;
        }
        body.dark .news-description {
            color: #4da8ff;
        }
        body.dark .auth-buttons a {
            color: #4da8ff;
        }
        .news-meta {
            font-size: 12px;
            color: #999;
            margin-top: 10px;
        }
        .news-actions {
            margin-top: 10px;
        }
        .btn-edit, .btn-delete {
            padding: 5px 10px;
            margin-right: 10px;
            text-decoration: none;
            border-radius: 3px;
            font-size: 12px;
        }
        .btn-edit {
            background-color: #ffc107;
            color: #333;
        }
        .btn-delete {
            background-color: #dc3545;
            color: white;
        }
        .pagination {
            margin-top: 40px;
            text-align: center;
        }
        .pagination a {
            padding: 10px 15px;
            margin: 0 5px;
            background-color: #007bff;
            color: white;
            text-decoration: none;
            border-radius: 5px;
        }
        .add-btn {
            display: inline-block;
            background-color: #28a745;
            color: white;
        }
    </style>
</head>
<body class="light">
    <div class="header">
        <h1>Новостной портал</h1>
        <div>
            <button class="theme-btn" onclick="toggleTheme()"> Тёмная/Светлая тема</button>
            <div class="auth-buttons" style="display: inline-block;">
                {% if user.is_authenticated %}
                    <span>Привет, {{ user.username }}!</span>
                    <a href="{% url 'add_news' %}">Добавить новость</a>
                    <a href="{% url 'logout' %}"> Выйти</a>
                {% else %}
                    <a href="{% url 'login' %}"> Вход</a>
                    <a href="{% url 'register' %}"> Регистрация</a>
                {% endif %}
            </div>
        </div>
    </div>

    <div class="container">
        {% block content %}
        {% endblock %}
    </div>

    <script>
        function toggleTheme() {
            const body = document.body;
            if (body.classList.contains('light')) {
                body.classList.remove('light');
                body.classList.add('dark');
                localStorage.setItem('theme', 'dark');
            } else {
                body.classList.remove('dark');
                body.classList.add('light');
                localStorage.setItem('theme', 'light');
            }
        }

        const savedTheme = localStorage.getItem('theme');
        if (savedTheme === 'dark') {
            document.body.classList.remove('light');
            document.body.classList.add('dark');
        }
    </script>
</body>
</html>
