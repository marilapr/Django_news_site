{% extends 'newsapp/base.html' %}

{% block content %}
    <div style="max-width: 800px; margin: 50px auto; padding: 30px; background-color: white; border-radius: 10px;">
        <h2>{{ title }}</h2>
        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" style="padding: 10px 20px; background-color: #007bff; color: white; border: none; border-radius: 5px;">
                Сохранить
            </button>
            <a href="{% url 'main_page' %}" style="padding: 10px 20px; background-color: #6c757d; color: white; text-decoration: none; border-radius: 5px;">
                Отмена
            </a>
        </form>
    </div>
{% endblock %}
